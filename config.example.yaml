# Example configuration for codex-gitlab-review.
# Keys marked "(optional)" can be omitted; defaults are noted in comments.
# Environment overrides:
# - CONFIG_PATH selects the config file (default: config.yaml).
# - CODEX_REVIEW__... overrides nested keys (example: CODEX_REVIEW__GITLAB__TOKEN).
# - RUN_ONCE and DRY_RUN override runtime behavior.

gitlab:
  # Required. Base URL of the GitLab instance (no /api/v4).
  base_url: "https://gitlab.example.com"
  # Required. Personal access token or OAuth token; can be empty for public read-only access.
  token: "${GITLAB_TOKEN}"
  # Optional. Bot user id; if omitted and token is set, resolved via GitLab API.
  bot_user_id: 1234
  # Optional. Only review merge requests created after this RFC3339 timestamp.
  created_after: "2025-01-01T00:00:00Z"
  # Optional. Target selection (defaults to empty lists, refresh_seconds: 3600).
  targets:
    # Optional. List of "group/project" paths or "all". If repos or groups is "all",
    # all projects are included before applying exclusions.
    repos:
      - "group/project-a"
      - "group/project-b"
    # Optional. List of group paths or "all".
    groups:
      - "group/subgroup"
    # Optional. List of "group/project" paths to exclude.
    exclude_repos:
      - "group/project-b"
    # Optional. List of group paths to exclude (covers subgroups).
    exclude_groups:
      - "group/subgroup"
    # Optional. Cache TTL for discovered projects in seconds; 0 disables caching.
    refresh_seconds: 3600

schedule:
  # Required. Cron expression with seconds (6 fields) or shorthand like "@hourly".
  cron: "0 */10 * * * *"
  # Optional. IANA timezone name; null or omitted means UTC.
  timezone: "UTC"

review:
  # Required. Max concurrent reviews.
  max_concurrent: 2
  # Required. GitLab award emoji for "review in progress".
  eyes_emoji: "eyes"
  # Required. GitLab award emoji for "review passed".
  thumbs_emoji: "thumbsup"
  # Required. Prefix used to mark review comments to avoid duplicate processing.
  comment_marker_prefix: "<!-- codex-review:sha="
  # Required. Minutes after which in-progress reviews are treated as stale.
  stale_in_progress_minutes: 120
  # Optional. If true, skip all GitLab writes (awards/notes).
  dry_run: false
  # Optional. Extra review instructions appended to a synced copy of Codex's
  # upstream review target prompt templates when set.
  additional_developer_instructions: null
  # Optional. Mention-triggered thread commands configuration.
  mention_commands:
    # Optional. Enable mention-triggered command execution from MR discussions.
    enabled: false
    # Optional. Override @mention username. null means auto-detect from token user.
    bot_username: null
    # Optional. Mention-specific in-progress emoji. null falls back to review.eyes_emoji.
    eyes_emoji: null
    # Optional. Extra developer instructions appended for mention-triggered reviews.
    additional_developer_instructions: null

codex:
  # Required. Docker image containing the Codex app-server.
  image: "ghcr.io/openai/codex-universal:latest"
  # Required. Timeout per review in seconds.
  timeout_seconds: 1800
  # Optional. Host path containing Codex auth/config; if empty, uses auth_mount_path.
  # Must be writable to persist refreshed auth.json credentials.
  auth_host_path: "/root/.codex"
  # Required. Container path to mount auth/config from host (read-only).
  auth_mount_path: "/root/.codex"
  # Optional. Host path containing Codex JSONL session history used for async transcript backfill.
  session_history_path: "/root/.codex/sessions"
  # Optional. Additional Codex auth accounts in priority order (highest priority first).
  # Primary auth_host_path is always preferred when available again.
  fallback_auth_accounts:
    - name: "backup-1"
      auth_host_path: "/root/.codex-backup-1"
    - name: "backup-2"
      auth_host_path: "/root/.codex-backup-2"
  # Optional. Cooldown in seconds when usage-limit reset time cannot be parsed from error output.
  usage_limit_fallback_cooldown_seconds: 3600
  # Required. Sandbox mode passed to Codex: "read-only", "workspace-write", or "danger-full-access".
  exec_sandbox: "danger-full-access"
  browser_mcp:
    # Optional. Start a sibling browser container inside Docker and make it reachable
    # from the Codex app-server at http://127.0.0.1:9222.
    # The review service injects the matching MCP server via Codex CLI config overrides.
    enabled: false
    # Optional. MCP server name injected into the Codex runtime config when enabled.
    # Must match ^[a-zA-Z0-9_-]+$ because Codex CLI -c overrides use dotted paths.
    server_name: "chrome-devtools"
    # Optional. Browser image launched inside Docker for each review/mention run.
    browser_image: "chromedp/headless-shell:latest"
    # Optional. Override the browser image entrypoint.
    # When unset, the default chromedp/headless-shell image keeps its image default
    # wrapper entrypoint and the review service skips injecting debug-port/address flags.
    # Other images still use their image default entrypoint when this stays empty.
    browser_entrypoint: []
    # Optional. Chrome remote debugging port shared with the Codex container network namespace.
    # Only 9222 is supported.
    remote_debugging_port: 9222
    # Optional. Extra browser args appended after the default remote-debugging flags.
    # Must not override --remote-debugging-address or --remote-debugging-port.
    browser_args:
      - "--no-sandbox"
    # Optional. MCP launcher command inside the Codex image.
    # Default uses `npx` and therefore needs npm access or a warm cache.
    mcp_command: "npx"
    # Optional. Extra MCP launcher args before the injected --browserUrl flag.
    # Override this to pin a version or use a preinstalled binary wrapper.
    mcp_args:
      - "-y"
      - "chrome-devtools-mcp@latest"
  # Optional. Per-mode runtime overrides for MCP servers already configured in Codex config.toml.
  # Override keys must match ^[a-zA-Z0-9_-]+$ because Codex CLI -c overrides use dotted paths.
  # This also applies to browser_mcp.server_name, so review/mention can disable the injected browser MCP independently.
  # Each entry maps MCP server name -> enabled flag and becomes:
  #   codex -c mcp_servers.<name>.enabled=<true|false> app-server
  mcp_server_overrides:
    review:
      github: true
      playwright: false
    mention:
      github: false
      playwright: true
  # Optional. Per-mode reasoning effort overrides for Codex app-server sessions.
  # When unset, Codex uses the value from config.toml profiles or model defaults.
  # Supported values: low, medium, high, xhigh.
  # Each entry becomes:
  #   codex -c model_reasoning_effort="<value>" app-server
  reasoning_effort:
    review: "high"
    mention: "low"
  # Optional. Per-mode reasoning summary overrides for Codex app-server sessions.
  # Defaults restore readable reasoning summaries even if upstream model defaults change.
  # Supported values: none, auto, detailed.
  # Each entry becomes:
  #   codex -c model_reasoning_summary="<value>" app-server
  reasoning_summary:
    review: "detailed"
    mention: "detailed"
  # Optional. Prefetch dependency sources before running Codex (root-only detection).
  # Note: prefetch runs before Codex and counts toward timeout_seconds.
  deps:
    enabled: false

docker:
  # Optional. Docker host to connect to; default is "unix:///var/run/docker.sock".
  host: "tcp://localhost:2375"

database:
  # Required. SQLite database path for persistent state.
  path: "/data/state.sqlite"

server:
  # Required. Health server bind address.
  bind_addr: "0.0.0.0:8080"
  # Optional. Enable the status HTML/JSON endpoints on the same listener.
  # Keep this false unless the listener is reachable only through an authenticated proxy.
  status_ui_enabled: false
