suite: gitlab discovery mcp defaults
templates:
  - templates/codex-auth-configmap.yaml
  - templates/configmap.yaml
  - templates/deployment.yaml
  - templates/secret.yaml
  - templates/service.yaml
release:
  namespace: review-system
tests:
  - it: renders the runtime flag disabled and the MCP listener enabled by default
    template: templates/configmap.yaml
    asserts:
      - equal:
          path: kind
          value: ConfigMap
      - matchRegex:
          path: data["config.yaml"]
          pattern: "(?ms)^feature_flags:\\n  gitlab_discovery_mcp: false\\n  gitlab_inline_review_comments: false\\n  composer_install: false\\n  composer_safe_install: false$"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "(?m)^  gitlab_discovery_mcp:\\n    enabled: true$"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "(?m)^    allow: \\[\\]$"
  - it: leaves advertise_url empty in config so the service can derive the runtime default
    template: templates/configmap.yaml
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: '(?m)^    advertise_url: ""$'
  - it: exposes POD_IP to the service when advertiseUrl is left empty
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
  - it: exposes a dedicated MCP container port
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: mcp
            containerPort: 8081
  - it: exposes a dedicated MCP service port
    template: templates/service.yaml
    asserts:
      - contains:
          path: spec.ports
          content:
            name: mcp
            port: 8081
            targetPort: mcp
  - it: syncs the rendered MCP port with a custom bind_addr port
    template: templates/configmap.yaml
    set:
      config.codex.gitlabDiscoveryMcp.bindAddr: "0.0.0.0:19091"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: '(?m)^    bind_addr: "0.0.0.0:19091"$'
  - it: syncs a custom bind_addr port into the rendered config
    template: templates/configmap.yaml
    set:
      config.codex.gitlabDiscoveryMcp.bindAddr: "0.0.0.0:19091"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: '(?m)^    bind_addr: "0.0.0.0:19091"$'
      - matchRegex:
          path: data["config.yaml"]
          pattern: '(?m)^    advertise_url: ""$'
  - it: preserves an explicit advertiseUrl override in the rendered config
    template: templates/configmap.yaml
    set:
      config.codex.gitlabDiscoveryMcp.advertiseUrl: "http://gitlab-discovery.example.internal:18081/mcp"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: '(?m)^    advertise_url: "http://gitlab-discovery.example.internal:18081/mcp"$'
  - it: still avoids POD_IP injection when advertiseUrl is explicit
    template: templates/deployment.yaml
    set:
      config.codex.gitlabDiscoveryMcp.advertiseUrl: "http://gitlab-discovery.example.internal:18081/mcp"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POD_IP
  - it: treats whitespace-only advertiseUrl as empty for runtime derivation
    template: templates/deployment.yaml
    set:
      config.codex.gitlabDiscoveryMcp.advertiseUrl: "   "
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: CODEX_REVIEW__CODEX__GITLAB_DISCOVERY_MCP__ADVERTISE_URL
  - it: treats null advertiseUrl as empty for runtime derivation
    template: templates/deployment.yaml
    set:
      config.codex.gitlabDiscoveryMcp.advertiseUrl: null
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: CODEX_REVIEW__CODEX__GITLAB_DISCOVERY_MCP__ADVERTISE_URL
  - it: syncs the deployment MCP port with a custom bind_addr port
    template: templates/deployment.yaml
    set:
      config.codex.gitlabDiscoveryMcp.bindAddr: "0.0.0.0:19091"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: mcp
            containerPort: 19091
  - it: syncs the service MCP port with a custom bind_addr port
    template: templates/service.yaml
    set:
      config.codex.gitlabDiscoveryMcp.bindAddr: "0.0.0.0:19091"
    asserts:
      - contains:
          path: spec.ports
          content:
            name: mcp
            port: 19091
            targetPort: mcp
  - it: hides the MCP ports when the listener is disabled
    set:
      config.codex.gitlabDiscoveryMcp.enabled: false
    asserts:
      - notContains:
          template: templates/deployment.yaml
          path: spec.template.spec.containers[0].ports
          content:
            name: mcp
            containerPort: 8081
      - notContains:
          template: templates/service.yaml
          path: spec.ports
          content:
            name: mcp
            port: 8081
            targetPort: mcp
  - it: rejects non-wildcard MCP bind hosts in the chart
    template: templates/deployment.yaml
    set:
      config.codex.gitlabDiscoveryMcp.bindAddr: "10.0.0.5:8081"
    asserts:
      - failedTemplate:
          errorMessage: config.codex.gitlabDiscoveryMcp.bindAddr must use a wildcard host (0.0.0.0 or [::]) in the Helm chart
  - it: rejects HTTP and MCP listener port collisions in the chart
    template: templates/deployment.yaml
    set:
      service.mcpPort: 8080
    asserts:
      - failedTemplate:
          errorMessage: config.server.bindAddr and config.codex.gitlabDiscoveryMcp.bindAddr must not target the same listener socket
