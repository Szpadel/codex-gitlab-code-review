image:
  repository: "ghcr.io/szpadel/codex-gitlab-review"
  tag: "latest"
  pullPolicy: Always

service:
  port: 8080
  mcpPort: 8081

clusterDomain: "cluster.local"

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: "codex-gitlab-review.local"
      paths:
        - path: "/"
          pathType: Prefix
  tls: []

resources: {}

serviceAccount:
  create: true
  name: ""

persistence:
  # Persistent storage is required for auth.json and state.
  # After installing, run `codex-gitlab-review auth login` in the pod to
  # create or refresh auth.json on the PVC.
  size: 1Gi
  storageClass: ""

config:
  featureFlags:
    # Runtime feature flag snapshot default. The MCP server is configured below,
    # but agent access stays off until this flag is enabled at runtime.
    gitlabDiscoveryMcp: false
    gitlabInlineReviewComments: false
    securityContextIgnoreBaseHead: false
    composerInstall: false
    # Derive temporary Composer repository entries from COMPOSER_AUTH HTTP auth hosts.
    # Only takes effect when composerInstall is enabled for a run.
    composerAutoRepositories: false
    composerSafeInstall: false
    securityReview: false
  schedule:
    cron: "0 * * * * *"
    timezone: "UTC"
  review:
    maxConcurrent: 2
    eyesEmoji: "eyes"
    thumbsEmoji: "thumbsup"
    commentMarkerPrefix: "<!-- codex-review:sha="
    staleInProgressMinutes: 120
    dryRun: false
    # Optional. Extra review instructions appended to a synced copy of Codex's
    # upstream review target prompt templates when set.
    additionalDeveloperInstructions: null
    security:
      contextTtlSeconds: 1209600
      minConfidenceScore: 0.85
      commentMarkerPrefix: "<!-- codex-security-review:sha="
      findingMarkerPrefix: "<!-- codex-security-review-finding:sha="
      additionalDeveloperInstructions: null
    mentionCommands:
      enabled: false
      botUsername: null
      # Optional. Mention-specific in-progress emoji. null falls back to config.review.eyesEmoji.
      eyesEmoji: null
      # Optional. Extra developer instructions appended to mention flow.
      additionalDeveloperInstructions: null
  codex:
    image: "ghcr.io/openai/codex-universal:latest"
    timeoutSeconds: 1800
    # Leave empty to default to authMountPath.
    # Must be writable to persist refreshed auth.json credentials.
    authHostPath: ""
    authMountPath: "/root/.codex"
    # Leave empty to default to <authMountPath>/sessions inside the review pod.
    # When set outside the mounted auth directories, the chart mounts the primary
    # auth sessions subtree at this path for async transcript backfill.
    sessionHistoryPath: ""
    # Optional fallback auth accounts in descending priority order.
    # Every account should use a distinct host path so each auth.json is isolated.
    fallbackAuthAccounts: []
    # Fallback cooldown in seconds when usage-limit reset timestamp cannot be parsed.
    usageLimitFallbackCooldownSeconds: 3600
    browserMcp:
      enabled: false
      # MCP server name injected into Codex runtime config.
      # Must match ^[a-zA-Z0-9_-]+$ because Codex CLI -c overrides use dotted paths.
      serverName: "chrome-devtools"
      # Browser container image launched inside dind for each Codex run.
      browserImage: "chromedp/headless-shell:latest"
      # Optional override for the browser image entrypoint.
      # When unset, the default chromedp/headless-shell image keeps its image default
      # wrapper entrypoint and the review service skips injecting debug-port/address flags.
      # Other images still use their image default entrypoint when this stays empty.
      browserEntrypoint: []
      # Remote debugging port shared with the Codex container network namespace.
      # Only 9222 is supported.
      remoteDebuggingPort: 9222
      # Extra Chrome/headless-shell args appended after the default remote-debugging flags.
      # Do not set --remote-debugging-address or --remote-debugging-port here.
      browserArgs: []
      # MCP launcher command inside the Codex image. Default requires npm access or warm cache.
      mcpCommand: "npx"
      # Extra MCP launcher args before the injected --browserUrl flag.
      mcpArgs:
        - "-y"
        - "chrome-devtools-mcp@latest"
    gitlabDiscoveryMcp:
      # Enable the internal MCP listener and inject its config into new runs when
      # the runtime feature flag is switched on.
      enabled: true
      serverName: "gitlab-discovery"
      # Leave empty to default to 0.0.0.0:<service.mcpPort>.
      bindAddr: ""
      # Leave empty to let the service derive a reachable runtime address.
      # Helm injects POD_IP, so the runtime prefers
      # http://$POD_IP:<service.mcpPort>/mcp and falls back to
      # http://host.docker.internal:<service.mcpPort>/mcp when POD_IP is absent.
      advertiseUrl: ""
      cloneRoot: "/work/mcp"
      # Empty by default: the server starts, but exposes no repositories until
      # explicit allow rules are configured.
      #
      # Example 1: allow reviews from one source group to browse, inspect, and
      # clone repos from a shared platform group.
      # allow:
      #   - sourceGroupPrefixes:
      #       - "company/product"
      #     targetGroups:
      #       - "company/platform"
      #
      # Example 2: allow a specific source repo to inspect/clone one fixed repo
      # plus browse a release-tools group.
      # allow:
      #   - sourceRepos:
      #       - "company/product/backend"
      #     targetRepos:
      #       - "company/shared/contracts"
      #     targetGroups:
      #       - "company/release-tools"
      #
      # Example 3: combine exact repo and source group rules. Matching rules are
      # unioned, so the same review can see both shared libraries and platform repos.
      # allow:
      #   - sourceRepos:
      #       - "company/product/frontend"
      #     targetRepos:
      #       - "company/design-system/ui-kit"
      #   - sourceGroupPrefixes:
      #       - "company/product"
      #     targetGroups:
      #       - "company/platform"
      allow: []
    # Optional. Per-mode MCP server enabled flags for servers defined in Codex config.toml.
    # Override keys must match ^[a-zA-Z0-9_-]+$ because Codex CLI -c overrides use dotted paths.
    # This also applies to browserMcp.serverName, so review/mention can disable the injected browser MCP independently.
    # Converted to codex CLI overrides: -c mcp_servers.<name>.enabled=<true|false>
    mcpServerOverrides:
      review: {}
      mention: {}
    # Optional. Per-session overrides passed to Codex app-server.
    # Each session can set a model and/or reasoning effort independently.
    # Supported reasoning effort values: low, medium, high, xhigh.
    sessionOverrides:
      review:
        model: null
        reasoningEffort: null
      mention:
        model: null
        reasoningEffort: null
      securityContext:
        model: null
        reasoningEffort: "xhigh"
      securityReview:
        model: null
        reasoningEffort: "high"
    # Per-mode reasoning summary overrides passed to Codex app-server.
    # Defaults restore readable reasoning summaries even if upstream model defaults change.
    # Supported values: none, auto, detailed.
    reasoningSummary:
      review: "detailed"
      mention: "detailed"
    execSandbox: "danger-full-access"
  docker:
    host: "unix:///var/run/docker.sock"
  server:
    bindAddr: "0.0.0.0:8080"
    # Keep this independent from ingress.enabled.
    # If false, ingress can still route to /healthz but the status UI/API stays disabled.
    # Runtime feature-flag changes through the web UI require this to be true.
    statusUiEnabled: false

gitlab:
  baseUrl: "https://gitlab.example.com"
  targets:
    repos: []
    groups: []
    excludeRepos: []
    excludeGroups: []
    refreshSeconds: 3600
  botUserId: ""
  createdAfter: ""
  token:
    existingSecret: ""
    secretKey: "token"
    value: ""

# Optional raw Codex config.toml content copied into the auth directory.
# browserMcp runtime injection is handled by the review service at run start.
# Built-in proxy and egress-firewall support are intentionally not provided by this chart.
# Use platform-native networking controls outside the chart when restricted egress is required.
codexToml: ""

dind:
  image: "docker:dind"
  resources: {}
