{{- $primaryAuthSubPath := "codex-auth" -}}
{{- $primaryAuthHostPath := default .Values.config.codex.authMountPath .Values.config.codex.authHostPath -}}
{{- $authMountPath := .Values.config.codex.authMountPath -}}
{{- $sessionHistoryPath := default (printf "%s/sessions" $authMountPath) .Values.config.codex.sessionHistoryPath -}}
{{- $authAccountMounts := list (dict "hostPath" $primaryAuthHostPath "subPath" $primaryAuthSubPath) -}}
{{- $allAuthHostPaths := list $primaryAuthHostPath -}}
{{- range $index, $account := .Values.config.codex.fallbackAuthAccounts -}}
{{- $fallbackSubPath := printf "codex-auth-fallback-%s" ((sha256sum $account.authHostPath) | trunc 12) -}}
{{- $authAccountMounts = append $authAccountMounts (dict "hostPath" $account.authHostPath "subPath" $fallbackSubPath) -}}
{{- $allAuthHostPaths = append $allAuthHostPaths $account.authHostPath -}}
{{- end -}}
{{- $containerAuthMounts := $authAccountMounts -}}
{{- if and (ne $primaryAuthHostPath $authMountPath) (not (has $authMountPath $allAuthHostPaths)) -}}
{{- $containerAuthMounts = append $containerAuthMounts (dict "hostPath" $authMountPath "subPath" $primaryAuthSubPath) -}}
{{- end -}}
{{- $sessionHistoryPathState := dict "covered" false -}}
{{- range $mount := $containerAuthMounts -}}
{{- $mountPath := trimSuffix "/" $mount.hostPath -}}
{{- $normalizedSessionHistoryPath := trimSuffix "/" $sessionHistoryPath -}}
{{- if or (eq $normalizedSessionHistoryPath $mountPath) (hasPrefix (printf "%s/" $mountPath) $normalizedSessionHistoryPath) -}}
{{- $_ := set $sessionHistoryPathState "covered" true -}}
{{- end -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codex-gitlab-review.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "codex-gitlab-review.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "codex-gitlab-review.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "codex-gitlab-review.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/codex-config: {{ include (print $.Template.BasePath "/codex-auth-configmap.yaml") . | sha256sum }}
        checksum/gitlab-token: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "codex-gitlab-review.serviceAccountName" . }}
      initContainers:
        - name: seed-codex-auth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
                set -eu
{{- range $authAccountMounts }}
                auth_dir="/mnt/data/{{ .subPath }}"
                mkdir -p "$auth_dir"
                mkdir -p "${auth_dir}/sessions"
                if [ -f "/seed-config/config.toml" ]; then
                  cp "/seed-config/config.toml" "${auth_dir}/config.toml"
                  chmod 0600 "${auth_dir}/config.toml"
                fi
{{- end }}
          volumeMounts:
            - name: data
              mountPath: /mnt/data
{{- if .Values.codexToml }}
            - name: codex-config
              mountPath: /seed-config
              readOnly: true
{{- end }}
      containers:
        - name: codex-review
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CONFIG_PATH
              value: "/etc/codex/config.yaml"
            - name: CODEX_REVIEW__GITLAB__TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-gitlab-token" (include "codex-gitlab-review.fullname" .)) .Values.gitlab.token.existingSecret }}
                  key: {{ .Values.gitlab.token.secretKey }}
            - name: RUST_LOG
              value: "info"
{{- if .Values.config.codex.gitlabDiscoveryMcp.enabled }}
{{- $gitlabDiscoveryAdvertiseUrl := .Values.config.codex.gitlabDiscoveryMcp.advertiseUrl -}}
{{- if not $gitlabDiscoveryAdvertiseUrl }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
{{- end }}
{{- if $gitlabDiscoveryAdvertiseUrl }}
            - name: CODEX_REVIEW__CODEX__GITLAB_DISCOVERY_MCP__ADVERTISE_URL
              value: {{ $gitlabDiscoveryAdvertiseUrl | quote }}
{{- end }}
{{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/codex
            - name: data
              mountPath: /data
{{- range $containerAuthMounts }}
            - name: data
              mountPath: {{ .hostPath }}
              subPath: {{ .subPath }}
{{- end }}
{{- if not ($sessionHistoryPathState.covered) }}
            - name: data
              mountPath: {{ $sessionHistoryPath }}
              subPath: {{ printf "%s/sessions" $primaryAuthSubPath }}
{{- end }}
            - name: docker-socket
              mountPath: /var/run
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
{{- if .Values.config.codex.gitlabDiscoveryMcp.enabled }}
            - name: mcp
              containerPort: {{ include "codex-gitlab-review.gitlabDiscoveryMcpPort" . }}
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
        - name: dind
          image: {{ .Values.dind.image }}
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-graph
              mountPath: /var/lib/docker
            - name: docker-socket
              mountPath: /var/run
{{- range $containerAuthMounts }}
            - name: data
              mountPath: {{ .hostPath }}
              subPath: {{ .subPath }}
{{- end }}
          resources:
{{ toYaml .Values.dind.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "codex-gitlab-review.fullname" . }}-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "codex-gitlab-review.fullname" . }}-data
        - name: docker-graph
          emptyDir: {}
        - name: docker-socket
          emptyDir: {}
{{- if .Values.codexToml }}
        - name: codex-config
          configMap:
            name: {{ include "codex-gitlab-review.fullname" . }}-codex-config
{{- end }}
