{{- $serverHost := include "codex-gitlab-review.serverBindHost" . -}}
{{- $serverPort := include "codex-gitlab-review.serverBindPort" . -}}
{{- $mcpHost := include "codex-gitlab-review.gitlabDiscoveryMcpBindHost" . -}}
{{- $mcpPort := include "codex-gitlab-review.gitlabDiscoveryMcpPort" . -}}
{{- if and .Values.config.codex.gitlabDiscoveryMcp.enabled (eq (include "codex-gitlab-review.gitlabDiscoveryMcpBindHostIsWildcard" .) "false") -}}
{{- fail "config.codex.gitlabDiscoveryMcp.bindAddr must use a wildcard host (0.0.0.0 or [::]) in the Helm chart" -}}
{{- end }}
{{- if and .Values.config.codex.gitlabDiscoveryMcp.enabled (eq $serverPort $mcpPort) (or (eq $serverHost $mcpHost) (eq (include "codex-gitlab-review.serverBindHostIsWildcard" .) "true") (eq (include "codex-gitlab-review.gitlabDiscoveryMcpBindHostIsWildcard" .) "true")) -}}
{{- fail "config.server.bindAddr and config.codex.gitlabDiscoveryMcp.bindAddr must not target the same listener socket" -}}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "codex-gitlab-review.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "codex-gitlab-review.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}

data:
  config.yaml: |
    feature_flags:
      gitlab_discovery_mcp: {{ .Values.config.featureFlags.gitlabDiscoveryMcp }}
      gitlab_inline_review_comments: {{ .Values.config.featureFlags.gitlabInlineReviewComments }}
      composer_install: {{ .Values.config.featureFlags.composerInstall }}
      composer_auto_repositories: {{ .Values.config.featureFlags.composerAutoRepositories }}
      composer_safe_install: {{ .Values.config.featureFlags.composerSafeInstall }}
      security_review: {{ .Values.config.featureFlags.securityReview }}
    gitlab:
      base_url: {{ .Values.gitlab.baseUrl | quote }}
      token: ""
{{- if .Values.gitlab.botUserId }}
      bot_user_id: {{ .Values.gitlab.botUserId }}
{{- else }}
      bot_user_id: null
{{- end }}
{{- if .Values.gitlab.createdAfter }}
      created_after: {{ .Values.gitlab.createdAfter | quote }}
{{- end }}
      targets:
        repos:
{{- if .Values.gitlab.targets.repos }}
{{ toYaml .Values.gitlab.targets.repos | indent 8 }}
{{- else }}
          []
{{- end }}
        groups:
{{- if .Values.gitlab.targets.groups }}
{{ toYaml .Values.gitlab.targets.groups | indent 8 }}
{{- else }}
          []
{{- end }}
        exclude_repos:
{{- if .Values.gitlab.targets.excludeRepos }}
{{ toYaml .Values.gitlab.targets.excludeRepos | indent 8 }}
{{- else }}
          []
{{- end }}
        exclude_groups:
{{- if .Values.gitlab.targets.excludeGroups }}
{{ toYaml .Values.gitlab.targets.excludeGroups | indent 8 }}
{{- else }}
          []
{{- end }}
        refresh_seconds: {{ .Values.gitlab.targets.refreshSeconds }}
    schedule:
      cron: {{ .Values.config.schedule.cron | quote }}
{{- if .Values.config.schedule.timezone }}
      timezone: {{ .Values.config.schedule.timezone | quote }}
{{- else }}
      timezone: null
{{- end }}
    review:
      max_concurrent: {{ .Values.config.review.maxConcurrent }}
      eyes_emoji: {{ .Values.config.review.eyesEmoji | quote }}
      thumbs_emoji: {{ .Values.config.review.thumbsEmoji | quote }}
      comment_marker_prefix: {{ .Values.config.review.commentMarkerPrefix | quote }}
      stale_in_progress_minutes: {{ .Values.config.review.staleInProgressMinutes }}
      dry_run: {{ .Values.config.review.dryRun }}
{{- if .Values.config.review.additionalDeveloperInstructions }}
      additional_developer_instructions: |-
{{ .Values.config.review.additionalDeveloperInstructions | nindent 8 }}
{{- else }}
      additional_developer_instructions: null
{{- end }}
      security:
        context_ttl_seconds: {{ .Values.config.review.security.contextTtlSeconds }}
        min_confidence_score: {{ .Values.config.review.security.minConfidenceScore }}
        comment_marker_prefix: {{ .Values.config.review.security.commentMarkerPrefix | quote }}
        finding_marker_prefix: {{ .Values.config.review.security.findingMarkerPrefix | quote }}
{{- if .Values.config.review.security.additionalDeveloperInstructions }}
        additional_developer_instructions: |-
{{ .Values.config.review.security.additionalDeveloperInstructions | nindent 10 }}
{{- else }}
        additional_developer_instructions: null
{{- end }}
      mention_commands:
        enabled: {{ .Values.config.review.mentionCommands.enabled }}
{{- if .Values.config.review.mentionCommands.botUsername }}
        bot_username: {{ .Values.config.review.mentionCommands.botUsername | quote }}
{{- else }}
        bot_username: null
{{- end }}
{{- if .Values.config.review.mentionCommands.eyesEmoji }}
        eyes_emoji: {{ .Values.config.review.mentionCommands.eyesEmoji | quote }}
{{- else }}
        eyes_emoji: null
{{- end }}
{{- if .Values.config.review.mentionCommands.additionalDeveloperInstructions }}
        additional_developer_instructions: |-
{{ .Values.config.review.mentionCommands.additionalDeveloperInstructions | nindent 10 }}
{{- else }}
        additional_developer_instructions: null
{{- end }}
    codex:
      image: {{ .Values.config.codex.image | quote }}
      timeout_seconds: {{ .Values.config.codex.timeoutSeconds }}
      auth_host_path: {{ default .Values.config.codex.authMountPath .Values.config.codex.authHostPath | quote }}
      auth_mount_path: {{ .Values.config.codex.authMountPath | quote }}
      session_history_path: {{ default (printf "%s/sessions" .Values.config.codex.authMountPath) .Values.config.codex.sessionHistoryPath | quote }}
{{- if .Values.config.codex.fallbackAuthAccounts }}
      fallback_auth_accounts:
{{- range .Values.config.codex.fallbackAuthAccounts }}
        - name: {{ .name | quote }}
          auth_host_path: {{ .authHostPath | quote }}
{{- end }}
{{- else }}
      fallback_auth_accounts: []
{{- end }}
      usage_limit_fallback_cooldown_seconds: {{ .Values.config.codex.usageLimitFallbackCooldownSeconds }}
      browser_mcp:
        enabled: {{ .Values.config.codex.browserMcp.enabled }}
        server_name: {{ .Values.config.codex.browserMcp.serverName | quote }}
        browser_image: {{ .Values.config.codex.browserMcp.browserImage | quote }}
{{- if .Values.config.codex.browserMcp.browserEntrypoint }}
        browser_entrypoint:
{{ toYaml .Values.config.codex.browserMcp.browserEntrypoint | indent 10 }}
{{- else }}
        browser_entrypoint: []
{{- end }}
        remote_debugging_port: {{ .Values.config.codex.browserMcp.remoteDebuggingPort }}
{{- if .Values.config.codex.browserMcp.browserArgs }}
        browser_args:
{{ toYaml .Values.config.codex.browserMcp.browserArgs | indent 10 }}
{{- else }}
        browser_args: []
{{- end }}
        mcp_command: {{ .Values.config.codex.browserMcp.mcpCommand | quote }}
{{- if .Values.config.codex.browserMcp.mcpArgs }}
        mcp_args:
{{ toYaml .Values.config.codex.browserMcp.mcpArgs | indent 10 }}
{{- else }}
        mcp_args: []
{{- end }}
      gitlab_discovery_mcp:
        enabled: {{ .Values.config.codex.gitlabDiscoveryMcp.enabled }}
        server_name: {{ .Values.config.codex.gitlabDiscoveryMcp.serverName | quote }}
        bind_addr: {{ default (printf "0.0.0.0:%s" (include "codex-gitlab-review.gitlabDiscoveryMcpPort" .)) .Values.config.codex.gitlabDiscoveryMcp.bindAddr | quote }}
        advertise_url: {{ .Values.config.codex.gitlabDiscoveryMcp.advertiseUrl | default "" | trim | quote }}
        clone_root: {{ .Values.config.codex.gitlabDiscoveryMcp.cloneRoot | quote }}
{{- if .Values.config.codex.gitlabDiscoveryMcp.allow }}
        allow:
{{- range .Values.config.codex.gitlabDiscoveryMcp.allow }}
          - source_repos:
{{- if .sourceRepos }}
{{ toYaml .sourceRepos | indent 12 }}
{{- else }}
              []
{{- end }}
            source_group_prefixes:
{{- if .sourceGroupPrefixes }}
{{ toYaml .sourceGroupPrefixes | indent 12 }}
{{- else }}
              []
{{- end }}
            target_repos:
{{- if .targetRepos }}
{{ toYaml .targetRepos | indent 12 }}
{{- else }}
              []
{{- end }}
            target_groups:
{{- if .targetGroups }}
{{ toYaml .targetGroups | indent 12 }}
{{- else }}
              []
{{- end }}
{{- end }}
{{- else }}
        allow: []
{{- end }}
      mcp_server_overrides:
        review:
{{- if .Values.config.codex.mcpServerOverrides.review }}
{{- toYaml .Values.config.codex.mcpServerOverrides.review | nindent 10 }}
{{- else }}
          {}
{{- end }}
        mention:
{{- if .Values.config.codex.mcpServerOverrides.mention }}
{{- toYaml .Values.config.codex.mcpServerOverrides.mention | nindent 10 }}
{{- else }}
          {}
{{- end }}
      reasoning_effort:
{{- if .Values.config.codex.reasoningEffort.review }}
        review: {{ .Values.config.codex.reasoningEffort.review | quote }}
{{- else }}
        review: null
{{- end }}
{{- if .Values.config.codex.reasoningEffort.mention }}
        mention: {{ .Values.config.codex.reasoningEffort.mention | quote }}
{{- else }}
        mention: null
{{- end }}
      reasoning_summary:
{{- if .Values.config.codex.reasoningSummary.review }}
        review: {{ .Values.config.codex.reasoningSummary.review | quote }}
{{- else }}
        review: null
{{- end }}
{{- if .Values.config.codex.reasoningSummary.mention }}
        mention: {{ .Values.config.codex.reasoningSummary.mention | quote }}
{{- else }}
        mention: null
{{- end }}
      exec_sandbox: {{ .Values.config.codex.execSandbox | quote }}
    docker:
      host: {{ .Values.config.docker.host | quote }}
    database:
      path: "/data/state.sqlite"
    server:
      bind_addr: {{ .Values.config.server.bindAddr | quote }}
      status_ui_enabled: {{ .Values.config.server.statusUiEnabled }}
